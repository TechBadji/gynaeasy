name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gynaeasy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via Coolify webhook
        run: |
          curl -s -X GET \
            "http://162.55.162.230:8000/api/v1/deploy?uuid=k8qo4iwgkv70fwvzdsx4xojk&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
