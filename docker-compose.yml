version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gynaeasy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gynaeasy}
      POSTGRES_DB: ${POSTGRES_DB:-gynaeasy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gynaeasy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      POSTGRES_USER: ${POSTGRES_USER:-gynaeasy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gynaeasy}
      POSTGRES_DB: ${POSTGRES_DB:-gynaeasy}
      ORANGE_SMS_CLIENT_ID: ${ORANGE_SMS_CLIENT_ID:-}
      ORANGE_SMS_CLIENT_SECRET: ${ORANGE_SMS_CLIENT_SECRET:-}
      ORANGE_SMS_SENDER_NUMBER: ${ORANGE_SMS_SENDER_NUMBER:-}
      ORANGE_SMS_SENDER_NAME: ${ORANGE_SMS_SENDER_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
